{% extends "base.html" %}
{% block title %}Sign in · Panem{% endblock %}
{% block content %}
<style>
  /* Override body background for login page — near-black base for the aurora effect */
  body::before { background: #050300 !important; animation: none !important; }
  body::after { opacity: 0 !important; }
  body { background: #050300; }
</style>
<div class="login-shell">

  <!-- Aurora floor background -->
  <div class="scene" role="img" aria-label="Animated bakery floor background">
    <div class="glow-bloom"></div>
    <div class="floor-wrapper">
      <div class="floor"></div>
    </div>
  </div>

  <div class="login glass glass--strong">
    <div class="logo">PANEM</div>
    <div class="tag">Daily Bake Planner</div>

    {% if error %}<div class="err">{{ error }}</div>{% endif %}

    <form method="post" action="/login">
      <div class="filter">
        <label for="username">Username</label>
        <input id="username" type="text" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="filter">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" autocomplete="current-password" required>
      </div>
      <button class="btn btn--primary" type="submit" style="margin-top: 8px;">Sign in</button>
    </form>

    <div class="hint">
      Default users (change in production):<br>
      <code>operator / panem</code> &nbsp; · &nbsp; <code>analyst / panem</code>
    </div>
  </div>

</div>
{% endblock %}
